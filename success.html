<!doctype html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Gracias! · closr</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #050813 0%, #0F172A 50%, #1E293B 100%);
      color: #FFF;
      text-align: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(800px 500px at 50% 0%, rgba(99, 102, 241, .35), transparent 60%),
        radial-gradient(700px 400px at 50% 100%, rgba(34, 197, 94, .20), transparent 60%);
      pointer-events: none;
    }
    .success-box {
      position: relative;
      z-index: 1;
      max-width: 560px;
    }
    .success-check {
      width: 92px;
      height: 92px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22C55E 0%, #4ADE80 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 50px rgba(34, 197, 94, .45);
      animation: pop-in .6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .success-check svg { color: #fff; }
    @keyframes pop-in {
      0%   { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0 0 14px;
      line-height: 1.1;
    }
    .grad {
      background: linear-gradient(135deg, #818CF8 0%, #60A5FA 50%, #34D399 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p {
      font-size: 18px;
      color: rgba(255, 255, 255, .75);
      line-height: 1.6;
      margin: 0 0 28px;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: #6366F1;
      color: #fff;
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(99, 102, 241, .35);
      transition: transform .2s, box-shadow .2s, background .2s;
    }
    .btn-primary:hover {
      background: #4F46E5;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(99, 102, 241, .50);
    }
    .btn-ghost {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: 600;
    }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.16); }
    .footer-note {
      margin-top: 32px;
      font-size: 13px;
      color: rgba(255, 255, 255, .45);
    }
  </style>
</head>
<body>
  <div class="success-box">
    <div class="success-check" aria-hidden="true">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>¡Tu solicitud llegó! <span class="grad">Nos vemos en breve.</span></h1>
    <p>
      Te escribimos a tu email en menos de <strong style="color:#fff;">1 hora hábil</strong>
      con los próximos pasos para conectar tu WhatsApp.
    </p>
    <div class="actions">
      <a href="/" class="btn-primary">Volver al inicio</a>
      <a href="https://wa.me/56932942337?text=Hola%2C%20acabo%20de%20completar%20el%20formulario%20de%20closr" target="_blank" rel="noopener" class="btn-ghost">
        Hablar por WhatsApp ahora
      </a>
    </div>
    <p class="footer-note">closr · un producto de ValueData</p>
  </div>
</body>
</html>
